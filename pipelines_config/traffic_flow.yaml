pipeline_name: traffic_flow_ingestion
source:
  name: TomTom
  type: api
  base_url: https://api.tomtom.com
  endpoint: /traffic/services/4/flowSegmentData/absolute/10/json
  parameters:
    point: 41.2357,-8.6199
    key: $TOM_TOM_API_KEY

destinations:
