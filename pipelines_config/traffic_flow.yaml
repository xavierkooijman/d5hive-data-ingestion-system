    port: 5432
    database: warehouse
    schema: raw
    table: tomtom_traffic_flow
    username: postgres
    password: $MOTHERDUCK_TOKEN

save_raw: false

email:
  send: true
  from: cmmaiaxavier@gmail.com
  password: $EMAIL_PASSWORD
  api_key: $RESEND_API_KEY
  subject: TomTom Traffic Flow Ingestion Pipeline Report
  recipients:
    - cmmaiaxavier@gmail.com
    - xavierkooijman@gmail.com
