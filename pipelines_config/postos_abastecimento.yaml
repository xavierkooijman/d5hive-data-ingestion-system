pipeline_name: postos_abastecimento_ingestion

source:
  name: DGEG
  type: api
  base_url: https://servergeo.dgeg.gov.pt
  endpoint: /arcgis/services/Visualizadores/PACVR/MapServer/WFSServer?request=GetFeature&service=WFS&typename=PACVR:Postos_Abastecimento&outputFormat=GEOJSON

destinations:
  - type: postgresql
    name: MotherDuck
    host: pg.eu-central-1-aws.motherduck.com
    port: 5432
    database: warehouse
    schema: raw
    table: postos_abastecimento
    username: postgres
    password: $MOTHERDUCK_TOKEN

save_raw: false

email:
  send: true
  from: cmmaiaxavier@gmail.com
  password: $EMAIL_PASSWORD
  api_key: $RESEND_API_KEY
  subject: Postos Abastecimento DGEG Ingestion Pipeline Report
  recipients:
    - cmmaiaxavier@gmail.com
    - xavierkooijman@gmail.com
