pipeline_name: openweathermap_ingestion
source:
  name: openweathermap
  type: api
  base_url: https://api.openweathermap.org
  endpoint: /data/2.5/weather
  parameters:
    lat: 41.2357
    lon: -8.6199
    units: metric
    appid: $OPENWEATHERMAP_API_KEY

destinations:
  - type: postgresql
    name: MotherDuck
    host: pg.eu-central-1-aws.motherduck.com
    port: 5432
    database: warehouse
    schema: raw
    table: openweathermap
    username: postgres
    password: $MOTHERDUCK_TOKEN

save_raw: false

email:
  send: true
  from: cmmaiaxavier@gmail.com
  password: $EMAIL_PASSWORD
  api_key: $RESEND_API_KEY
  subject: Openweathermap Ingestion Pipeline Report
  recipients:
    - cmmaiaxavier@gmail.com
    - xavierkooijman@gmail.com
